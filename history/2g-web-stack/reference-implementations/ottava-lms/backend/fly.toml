# fly.toml app configuration file generated for melody-lms-api on 2025-11-10T12:57:35-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'melody-lms-api'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.http_options]
    h2 = false

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
